<div class="container">
  <h2 class="heading">Reactive Form</h2>
  <form (ngSubmit)="submitForm()" [formGroup]="userForm">
    <div class="form-group">
      <label for="name">Name</label>
      <input
        class="form-control"
        formControlName="name"
        id="name"
        type="text"
      />
      <div
        *ngIf="userForm?.get('name')?.invalid && userForm?.get('name')?.touched"
        class="text-danger"
      >
        Name is required.
      </div>
    </div>

    <div class="form-group">
      <label for="email">Email</label>
      <input
        class="form-control"
        formControlName="email"
        id="email"
        type="email"
      />
      <div
        *ngIf="
          userForm?.get('email')?.invalid && userForm?.get('email')?.touched
        "
        class="text-danger"
      >
        Please enter a valid email.
      </div>
    </div>

    <div class="form-group">
      <label for="address">Address</label>
      <input
        class="form-control"
        formControlName="address"
        id="address"
        type="text"
      />
      <div
        *ngIf="
          userForm?.get('address')?.invalid && userForm?.get('address')?.touched
        "
        class="text-danger"
      >
        Address is required.
      </div>
    </div>

    <div class="form-group">
      <label for="mobile">Mobile Number</label>
      <input
        class="form-control"
        formControlName="mobile"
        id="mobile"
        type="tel"
      />
      <div
        *ngIf="
          userForm?.get('mobile')?.invalid && userForm?.get('mobile')?.touched
        "
        class="text-danger"
      >
        Please enter a valid mobile number.
      </div>
    </div>

    <div class="form-group">
      <label for="age">Age</label>
      <input
        class="form-control"
        formControlName="age"
        id="age"
        type="number"
      />
      <div
        *ngIf="userForm?.get('age')?.invalid && userForm?.get('age')?.touched"
        class="text-danger"
      >
        Please enter a valid age (between 1 and 120).
      </div>
    </div>

    <div class="form-group">
      <label for="gender">Gender</label>
      <select class="form-control" formControlName="gender" id="gender">
        <option disabled value="">Select Gender</option>
        <option value="male">Male</option>
        <option value="female">Female</option>
        <option value="other">Other</option>
      </select>
      <div
        *ngIf="
          userForm?.get('gender')?.invalid && userForm?.get('gender')?.touched
        "
        class="text-danger"
      >
        Please select a gender.
      </div>
    </div>

    <button class="btn btn-primary" type="submit">Submit</button>
  </form>
</div>
